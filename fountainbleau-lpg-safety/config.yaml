  hero_title: "楓丹白露社區<br>瓦斯儲槽安全難題"
  subtitle: "以 1141230 公安會議簡報為基礎，整理社區背景、瓦斯供應演進、檢驗歷程、消防法規衝突與後續處理方向。"

quotes:
  opening:
    text: "這個個案的關鍵，不是設備完全沒有檢驗，而是同一套設備同時處在職安合格與消防違規的制度落差中。"
  closing:
    text: >
      公共安全案件不能只看單一證書或單一主管機關結論。
      當設備跨越職業安全與消防安全邊界時，最需要的是權責釐清、風險揭露與持續改善。

