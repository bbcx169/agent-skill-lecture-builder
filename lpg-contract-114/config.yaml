page:
  title: "114年度家用液化石油氣供氣契約宣導及查核"
  badge: "執行計畫導讀 · 新北市政府消防局"
  hero_title: "家用液化石油氣<br>供氣契約宣導與查核"
  subtitle: "依據 114 年度執行計畫，整理宣導、查核、通報與消費爭議處理流程，協助執行人員掌握任務分工與時程重點。"

quotes:
  opening:
    text: "定型化契約不是文書作業，而是保障消費者與零售業者權益、減少消費糾紛的第一道防線。"
  closing:
    text: >
      宣導要讓民眾知道可以主動要求簽約；查核要確認業者真的落實契約使用。
      只有宣導與查核一起到位，桶裝瓦斯消費市場才會更透明、更公平。

