page:
  title: "114年液化石油氣從業人員教育訓練"
  badge: "新北消防局 · 綱領修正版"
  hero_title: "液化石油氣從業人員<br>教育訓練修正版"
  subtitle: "依最新「使用液化石油氣容器營業場所安全管理行政指導綱領」重整課程內容，補強營業場所自主檢查、簽收確認、串接場所分級管理、配送與換裝作業要求。"

quotes:
  opening:
    text: "第一線從業人員的每一次換裝，不只是完成配送，更是在替營業場所守住風險擴大的第一道關卡。"
  closing:
    text: >
      修正版訓練的重點不是多背幾條規定，
      而是把自主檢查、簽收確認、換裝流程與異常處置，
      真的帶回每一次現場作業。

seo:
  title: "114年液化石油氣從業人員教育訓練修正版"
  description: "依最新液化石油氣容器營業場所安全管理行政指導綱領，增修新北市政府消防局 114 年液化石油氣從業人員教育訓練簡報，整理營業場所責任、配送注意事項、換裝流程與異常應變。"
